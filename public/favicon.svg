<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Bracket left -->
  <text x="4" y="44" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#a5b4fc" opacity="0.7">{</text>
  <!-- Initials FR -->
  <text x="15" y="43" font-family="'Courier New', monospace" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="-1">FR</text>
  <!-- Bracket right -->
  <text x="48" y="44" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#a5b4fc" opacity="0.7">}</text>
</svg>
